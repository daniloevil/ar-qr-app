<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR·QR — Visualizzazione AR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --text-dim: rgba(240,237,232,0.45);
    --text-mid: rgba(240,237,232,0.7);
    --accent: #c8f060;
    --accent-dim: rgba(200,240,96,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100svh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* TOP BAR */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
    z-index: 10;
  }
  .logo { font-family: 'DM Mono', monospace; font-size: 15px; color: var(--text); }
  .logo span { color: var(--accent); }
  .model-name-bar {
    font-size: 13px;
    color: var(--text-mid);
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .back-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-mid);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    padding: 6px 12px;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .back-btn:hover { border-color: rgba(255,255,255,0.18); color: var(--text); }

  /* MODEL VIEWER */
  model-viewer {
    flex: 1;
    width: 100%;
    background: var(--bg);
    --poster-color: #0a0a0a;
  }

  /* BOTTOM CONTROLS */
  .bottom-bar {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .ar-hint {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.05em;
  }
  .actions {
    display: flex; gap: 10px;
  }
  .btn-ar {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--accent);
    color: #0a0a0a;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    letter-spacing: -0.01em;
    transition: all 0.15s;
  }
  .btn-ar:hover { background: #d8f570; }
  .btn-share {
    width: 50px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s;
  }
  .btn-share:hover { border-color: rgba(255,255,255,0.18); }

  /* PLATFORM INFO */
  .platform-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 12px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
  }
  .platform-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

  /* LOADING OVERLAY */
  #loadingOverlay {
    position: absolute; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
    z-index: 5;
    pointer-events: none;
  }
  .loading-text { font-size: 13px; color: var(--text-dim); font-family: 'DM Mono', monospace; }
  .loading-bar { width: 120px; height: 2px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .loading-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    animation: loadAnim 1.8s ease-in-out infinite;
  }
  @keyframes loadAnim {
    0% { width: 0; margin-left: 0; }
    50% { width: 80%; margin-left: 0; }
    100% { width: 0; margin-left: 100%; }
  }

  /* AR BUTTON OVERRIDE (inside model-viewer) */
  .view-button {
    display: none !important;
  }

  /* TOAST */
  #toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(40px);
    background: var(--surface);
    border: 1px solid rgba(200,240,96,0.3);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--accent);
    z-index: 200;
    transition: transform 0.2s;
    white-space: nowrap;
    opacity: 0;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">AR<span>·</span>QR</div>
  <div class="model-name-bar" id="modelNameBar">Caricamento...</div>
  <a href="index.html" class="back-btn">← Dashboard</a>
</div>

<div style="position: relative; flex: 1; display: flex; flex-direction: column;">
  <div id="loadingOverlay">
    <div class="loading-text">caricamento modello...</div>
    <div class="loading-bar"><div class="loading-fill"></div></div>
  </div>
  <model-viewer
    id="viewer"
    alt="Modello 3D AR"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    camera-controls
    auto-rotate
    auto-rotate-delay="1000"
    rotation-per-second="20deg"
    shadow-intensity="1"
    environment-image="neutral"
    exposure="1"
    style="flex:1; width:100%;"
  ></model-viewer>
</div>

<div class="bottom-bar">
  <div style="display: flex; align-items: center; justify-content: space-between;">
    <div class="platform-badge">
      <div class="platform-dot"></div>
      <span id="platformLabel">Rilevamento dispositivo...</span>
    </div>
    <div style="font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace;">
      Ruota · Pinch · Tap per AR
    </div>
  </div>
  <div class="actions">
    <button class="btn-ar" onclick="launchAR()" id="arBtn">
      🥽 Vedi in Realtà Aumentata
    </button>
    <button class="btn-share" onclick="shareModel()" title="Condividi">⬆</button>
  </div>
  <div class="ar-hint" id="arHint">Nessuna app richiesta · WebAR nativo</div>
</div>

<div id="toast">✓ Copiato!</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const fileId = params.get('id');
  const fileName = params.get('name') || 'Modello 3D';

  document.title = `AR·QR — ${decodeURIComponent(fileName)}`;
  document.getElementById('modelNameBar').textContent = decodeURIComponent(fileName);

  const viewer = document.getElementById('viewer');
  const overlay = document.getElementById('loadingOverlay');

  if (fileId) {
    // Usa il link diretto di Google Drive per lo streaming
    const modelUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
    viewer.setAttribute('src', modelUrl);
    viewer.setAttribute('alt', decodeURIComponent(fileName));
  }

  viewer.addEventListener('load', () => {
    overlay.style.display = 'none';
  });

  viewer.addEventListener('error', () => {
    overlay.innerHTML = `
      <div style="text-align:center; padding: 24px;">
        <div style="font-size:32px; margin-bottom:16px;">⚠</div>
        <div style="font-size:14px; color: var(--text-mid); margin-bottom:8px;">Impossibile caricare il modello</div>
        <div style="font-size:12px; color: var(--text-dim); max-width:260px; line-height:1.6;">
          Assicurati che il file .glb su Google Drive abbia i permessi di condivisione pubblici.
        </div>
      </div>`;
    overlay.style.pointerEvents = 'all';
  });

  // PLATFORM DETECTION
  const ua = navigator.userAgent;
  const isIOS = /iPad|iPhone|iPod/.test(ua);
  const isAndroid = /Android/.test(ua);
  const platformLabel = document.getElementById('platformLabel');
  const arHint = document.getElementById('arHint');
  const arBtn = document.getElementById('arBtn');

  if (isIOS) {
    platformLabel.textContent = 'iOS — Apple QuickLook AR';
    arHint.textContent = 'AR nativa tramite Apple QuickLook · No app';
  } else if (isAndroid) {
    platformLabel.textContent = 'Android — Google Scene Viewer';
    arHint.textContent = 'AR tramite ARCore Scene Viewer · No app';
  } else {
    platformLabel.textContent = 'Desktop — Anteprima 3D';
    arHint.textContent = 'Per la realtà aumentata usa un dispositivo mobile';
    arBtn.textContent = '🖱 Ruota in 3D (desktop)';
  }

  function launchAR() {
    if (isIOS || isAndroid) {
      // Attiva la modalità AR di model-viewer
      viewer.activateAR();
    } else {
      alert('La realtà aumentata richiede un dispositivo mobile (iOS o Android).\nInquadra il QR Code con il tuo telefono per aprire questa pagina in AR.');
    }
  }

  function shareModel() {
    const url = window.location.href;
    if (navigator.share) {
      navigator.share({
        title: decodeURIComponent(fileName),
        text: 'Guarda questo modello in realtà aumentata!',
        url: url,
      });
    } else {
      navigator.clipboard.writeText(url).then(() => {
        const t = document.getElementById('toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
      });
    }
  }
</script>
</body>
</html>
