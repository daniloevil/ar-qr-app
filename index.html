<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>WebAR Viewer</title>

  <!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  WebAR Stateless Viewer                                      ║
  ║  Stack: model-viewer + jsDelivr CDN + qrcode.js             ║
  ║  Deploy: Vercel / Netlify (zero config, single file)        ║
  ║  Parametro URL: ?model=nomefile.glb                         ║
  ╚══════════════════════════════════════════════════════════════╝
  -->

  <!-- ① model-viewer: libreria WebXR di Google, gestisce ARCore e Quick Look -->
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js">
  </script>

  <!-- ② qrcode.js: generazione QR lato client, nessun server necessario -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    /* ── Reset e layout base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #1a1a1a;
      --border:    rgba(255,255,255,0.08);
      --accent:    #3ecfcf;
      --text:      #f0f0f0;
      --muted:     #888;
      --radius:    16px;
      --safe-b:    env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ── model-viewer occupa tutto lo schermo ── */
    model-viewer {
      width: 100%;
      height: 100dvh;
      background: transparent;
      --progress-bar-color: var(--accent);
      --progress-bar-height: 3px;
    }

    /* ── Barra superiore con nome modello ── */
    #top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 16px 20px;
      padding-top: max(16px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      z-index: 10;
      pointer-events: none;
    }

    #model-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text);
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      pointer-events: auto;
    }

    /* ── Pulsante QR in alto a destra ── */
    #qr-btn {
      pointer-events: auto;
      background: rgba(255,255,255,0.12);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    #qr-btn:hover { background: rgba(255,255,255,0.22); }

    /* ── Pulsante AR nativo (sostituisce il default di model-viewer) ── */
    #ar-btn {
      position: fixed;
      bottom: calc(32px + var(--safe-b));
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(62,207,207,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      /* Nascosto finché model-viewer non conferma il supporto AR */
      display: none;
    }
    #ar-btn:active { transform: translateX(-50%) scale(0.96); }

    /* ── Schermata di errore (modello non trovato) ── */
    #error-screen {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
      z-index: 20;
      text-align: center;
      padding: 32px;
    }
    #error-screen.visible { display: flex; }
    #error-screen h2 { font-size: 20px; color: var(--text); }
    #error-screen p  { font-size: 14px; color: var(--muted); max-width: 320px; line-height: 1.6; }
    #error-screen code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--accent);
      word-break: break-all;
    }

    /* ── Modale QR Code ── */
    #qr-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 30;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    #qr-modal.visible { display: flex; }

    #qr-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 28px 24px 20px;
      width: min(340px, calc(100vw - 40px));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    #qr-card h3 { font-size: 15px; color: #111; font-weight: 700; }
    #qr-code-container { /* qrcode.js inietta il canvas/img qui */ }
    #qr-url {
      font-size: 11px;
      color: #555;
      word-break: break-all;
      text-align: center;
      max-width: 280px;
    }
    .qr-actions {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .qr-actions button {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .qr-actions button:active { opacity: 0.75; }
    #btn-download { background: #111; color: #fff; }
    #btn-close    { background: #eee; color: #111; }
  </style>
</head>
<body>

  <!-- ③ Barra superiore: nome file + pulsante QR -->
  <div id="top-bar">
    <span id="model-name">WebAR Viewer</span>
    <button id="qr-btn" onclick="openQR()">📲 QR Code</button>
  </div>

  <!--
    ④ model-viewer core
    ─────────────────────────────────────────────────────
    • src         → URL del modello .glb (valorizzato via JS)
    • ios-src     → URL del modello .usdz per AR Quick Look su iOS
    • ar          → abilita il pulsante AR nativo del browser
    • ar-modes    → priorità: WebXR (Chrome Android) → Scene Viewer (ARCore) → Quick Look (iOS)
    • camera-controls → permette rotazione/zoom con touch/mouse
    • auto-rotate → rotazione automatica finché l'utente non interagisce
    • shadow-intensity → ombra sotto il modello in AR
    • reveal      → mostra il modello solo dopo il caricamento completo
  -->
  <model-viewer
    id="viewer"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    auto-rotate-delay="500"
    shadow-intensity="1"
    shadow-softness="0.8"
    reveal="auto"
    loading="eager"
    environment-image="neutral"
    exposure="1"
    tone-mapping="commerce"
    ar-button-style="none"
  >
    <!--
      Slot personalizzato per il pulsante AR:
      sostituisce il default di model-viewer con il nostro #ar-btn.
      model-viewer lo mostra/nasconde automaticamente in base al supporto AR.
    -->
    <button id="ar-btn" slot="ar-button" onclick="activateAR()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
        <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
        <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
        <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
        <path d="M12 8l4 2v4l-4 2-4-2v-4l4-2z"/>
      </svg>
      Visualizza in AR
    </button>
  </model-viewer>

  <!-- ⑤ Schermata di errore per modello mancante o URL non valido -->
  <div id="error-screen">
    <h2>Modello non trovato</h2>
    <p>Specifica un modello nell'URL usando il parametro <strong>?model=</strong></p>
    <code id="example-url"></code>
    <p style="font-size:12px; color: var(--muted);">
      Assicurati che il file esista nel repository GitHub e che il nome corrisponda esattamente.
    </p>
  </div>

  <!-- ⑥ Modale con QR Code generato lato client -->
  <div id="qr-modal" onclick="closeQROnBackdrop(event)">
    <div id="qr-card">
      <h3>Scansiona per aprire in AR</h3>
      <div id="qr-code-container"></div>
      <p id="qr-url"></p>
      <div class="qr-actions">
        <button id="btn-download" onclick="downloadQR()">⬇ Scarica PNG</button>
        <button id="btn-close"    onclick="closeQR()">Chiudi</button>
      </div>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════════════
    //  CONFIGURAZIONE
    //  Modifica solo questi valori per adattare al tuo repo
    // ════════════════════════════════════════════════════

    const CONFIG = {
      // ▸ Sostituisci con il tuo username GitHub
      githubUser: 'TUO-USERNAME',

      // ▸ Sostituisci con il nome del tuo repository
      githubRepo: 'TUO-REPO',

      // ▸ Branch del repository (di solito 'main' o 'master')
      githubBranch: 'main',

      // ▸ Cartella all'interno del repo dove carichi i modelli ('' = root)
      modelsFolder: 'models',
    };

    // ════════════════════════════════════════════════════
    //  COSTRUZIONE URL CDN via jsDelivr
    //  Formato: https://cdn.jsdelivr.net/gh/{user}/{repo}@{branch}/{path}/{file}
    // ════════════════════════════════════════════════════

    function buildCDNUrl(filename) {
      const folder = CONFIG.modelsFolder ? CONFIG.modelsFolder + '/' : '';
      return `https://cdn.jsdelivr.net/gh/${CONFIG.githubUser}/${CONFIG.githubRepo}@${CONFIG.githubBranch}/${folder}${filename}`;
    }

    // ════════════════════════════════════════════════════
    //  INIZIALIZZAZIONE: legge ?model= dall'URL
    // ════════════════════════════════════════════════════

    const viewer      = document.getElementById('viewer');
    const arBtn       = document.getElementById('ar-btn');
    const errorScreen = document.getElementById('error-screen');
    const modelName   = document.getElementById('model-name');
    const exampleUrl  = document.getElementById('example-url');

    const params    = new URLSearchParams(window.location.search);
    const modelParam = params.get('model'); // es: "sedia.glb"

    // URL completo della pagina corrente (usato anche per il QR)
    const currentURL = window.location.href;

    if (!modelParam) {
      // Nessun parametro: mostra la schermata di errore con esempio
      errorScreen.classList.add('visible');
      exampleUrl.textContent = `${window.location.origin}/?model=esempio.glb`;

    } else {
      // ── Determina il nome base e i nomi dei file ──
      const baseName  = modelParam.replace(/\.(glb|usdz)$/i, '');
      const glbFile   = baseName + '.glb';
      const usdzFile  = baseName + '.usdz';

      // ── Aggiorna il titolo nella top bar ──
      modelName.textContent = baseName.replace(/[-_]/g, ' ');
      document.title        = baseName + ' · WebAR';

      // ── Valorizza model-viewer con gli URL jsDelivr ──
      viewer.setAttribute('src',     buildCDNUrl(glbFile));
      viewer.setAttribute('ios-src', buildCDNUrl(usdzFile));

      // ── Mostra il pulsante AR appena model-viewer segnala il supporto ──
      viewer.addEventListener('ar-status', (e) => {
        // 'not-presenting' = AR disponibile ma non attivo
        // 'presenting'     = AR attivo
        // 'failed'         = AR non supportato
        if (e.detail.status !== 'failed') {
          arBtn.style.display = 'flex';
        }
      });

      // ── Gestione errore di caricamento modello ──
      viewer.addEventListener('error', (e) => {
        console.error('model-viewer error:', e.detail);
        errorScreen.classList.add('visible');
        exampleUrl.textContent = `File non trovato: ${buildCDNUrl(glbFile)}`;
      });
    }

    // ════════════════════════════════════════════════════
    //  FUNZIONE: avvia la sessione AR nativa
    //  model-viewer lo fa automaticamente tramite lo slot,
    //  ma questo handler aggiunge logica custom se necessario
    // ════════════════════════════════════════════════════

    function activateAR() {
      // model-viewer gestisce internamente ARCore / Quick Look
      // tramite lo slot "ar-button" — nessuna azione extra richiesta
    }

    // ════════════════════════════════════════════════════
    //  QR CODE GENERATOR
    //  Usa qrcode.js (caricato da cdnjs) per generare lato client
    // ════════════════════════════════════════════════════

    let qrInstance = null;

    function openQR() {
      const modal     = document.getElementById('qr-modal');
      const container = document.getElementById('qr-code-container');
      const urlLabel  = document.getElementById('qr-url');

      urlLabel.textContent = currentURL;
      modal.classList.add('visible');

      // Genera il QR solo la prima volta (poi lo riusa)
      if (!qrInstance) {
        container.innerHTML = ''; // pulizia sicura
        qrInstance = new QRCode(container, {
          text:           currentURL,
          width:          220,
          height:         220,
          colorDark:      '#000000',
          colorLight:     '#ffffff',
          correctLevel:   QRCode.CorrectLevel.H,  // H = alta ridondanza, ideale per la stampa
        });
      }
    }

    function closeQR() {
      document.getElementById('qr-modal').classList.remove('visible');
    }

    // Chiude cliccando sul backdrop scuro
    function closeQROnBackdrop(event) {
      if (event.target === document.getElementById('qr-modal')) closeQR();
    }

    // ── Download del QR come PNG ──
    function downloadQR() {
      const canvas = document.querySelector('#qr-code-container canvas');
      if (!canvas) return;

      // Crea un canvas temporaneo con padding bianco per la stampa
      const pad  = 20;
      const tmp  = document.createElement('canvas');
      tmp.width  = canvas.width  + pad * 2;
      tmp.height = canvas.height + pad * 2;
      const ctx  = tmp.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, tmp.width, tmp.height);
      ctx.drawImage(canvas, pad, pad);

      // Aggiunge l'URL come didascalia
      const baseName = (modelParam || 'webar').replace(/\.(glb|usdz)$/i, '');
      ctx.fillStyle  = '#333333';
      ctx.font       = '11px sans-serif';
      ctx.textAlign  = 'center';
      ctx.fillText(currentURL.slice(0, 60) + (currentURL.length > 60 ? '…' : ''), tmp.width / 2, tmp.height - 6);

      const link    = document.createElement('a');
      link.download = `qr-${baseName}.png`;
      link.href     = tmp.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
