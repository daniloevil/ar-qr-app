<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>WebAR Viewer</title>

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js">
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surface: #1c1c1c;
      --border:  rgba(255,255,255,0.09);
      --accent:  #3ecfcf;
      --text:    #f0f0f0;
      --muted:   #777;
      --radius:  14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ══ SCHERMATA RICERCA ══ */
    #search-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      background: var(--bg);
    }
    #search-screen.hidden { display: none; }

    .logo {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .search-title {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .search-sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* Campo testo + pulsante */
    .search-row {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 4px 4px 4px 22px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(62,207,207,0.13);
    }

    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 16px;
      padding: 12px 0;
      caret-color: var(--accent);
      min-width: 0;
    }
    #search-input::placeholder { color: var(--muted); }

    #search-go {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 40px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #search-go:active { opacity: 0.72; }

    /* ══ VIEWER SCREEN ══ */
    #viewer-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
    }
    #viewer-screen.visible { display: block; }

    model-viewer {
      width: 100%;
      height: 100dvh;
      background: transparent;
      --progress-bar-color: var(--accent);
      --progress-bar-height: 3px;
    }

    /* Top bar: solo freccia indietro e nome modello */
    #top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: max(14px, env(safe-area-inset-top)) 16px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
      z-index: 20;
    }

    #back-btn {
      background: rgba(255,255,255,0.13);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      width: 40px; height: 40px;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    #model-name {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Pulsante QR: grande, centrato in basso ── */
    #qr-fab {
      position: fixed;
      bottom: calc(36px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 18px 40px;
      background: rgba(20,20,20,0.85);
      border: 1.5px solid rgba(255,255,255,0.18);
      color: var(--text);
      border-radius: 60px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform 0.15s, background 0.15s;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }
    #qr-fab:active {
      transform: translateX(-50%) scale(0.96);
    }
    #qr-fab svg {
      flex-shrink: 0;
    }

    /* Pulsante AR nativo di model-viewer */
    #ar-btn {
      position: fixed;
      bottom: calc(120px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: none;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ══ MODALE QR ══ */
    #qr-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 60;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    #qr-modal.visible { display: flex; }

    #qr-card {
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 32px 28px 28px;
      width: min(480px, 100vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    /* Maniglia di trascinamento */
    .qr-handle {
      width: 40px; height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin-bottom: 4px;
    }

    #qr-card h3 {
      font-size: 17px;
      color: #111;
      font-weight: 700;
      text-align: center;
    }
    #qr-card p.qr-hint {
      font-size: 13px;
      color: #888;
      text-align: center;
      line-height: 1.5;
      margin-top: -6px;
    }

    #qr-code-container canvas,
    #qr-code-container img {
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    #qr-url {
      font-size: 11px;
      color: #999;
      word-break: break-all;
      text-align: center;
      max-width: 320px;
    }

    .qr-actions {
      display: flex;
      gap: 12px;
      width: 100%;
    }
    .qr-actions button {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .qr-actions button:active { opacity: 0.75; }
    #btn-download { background: #111; color: #fff; }
    #btn-close    { background: #f0f0f0; color: #111; }
  </style>
</head>
<body>

  <!-- ════ SCHERMATA RICERCA ════ -->
  <div id="search-screen">
    <p class="logo">WebAR Viewer</p>

    <h1 class="search-title">Visualizza un modello<br>in realtà aumentata</h1>
    <p class="search-sub">Inserisci il nome del file .glb<br>e premi Carica</p>

    <div class="search-row">
      <input
        type="text"
        id="search-input"
        placeholder="es: sedia.glb"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
      />
      <button id="search-go" onclick="loadFromInput()">Carica →</button>
    </div>
  </div>

  <!-- ════ VIEWER ════ -->
  <div id="viewer-screen">

    <div id="top-bar">
      <button id="back-btn" onclick="goBack()" title="Indietro">←</button>
      <span id="model-name">—</span>
    </div>

    <model-viewer
      id="viewer"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      auto-rotate-delay="600"
      shadow-intensity="1"
      shadow-softness="0.8"
      reveal="auto"
      loading="eager"
      environment-image="neutral"
      exposure="1"
      tone-mapping="commerce"
      ar-button-style="none"
    >
      <!-- Pulsante AR nativo (sopra il QR FAB) -->
      <button id="ar-btn" slot="ar-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
          <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
          <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
          <path d="M12 8l4 2v4l-4 2-4-2v-4l4-2z"/>
        </svg>
        Visualizza in AR
      </button>
    </model-viewer>

    <!-- Pulsante QR grande e centrato -->
    <button id="qr-fab" onclick="openQR()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="3" height="3"/>
        <rect x="18" y="14" width="3" height="3"/>
        <rect x="14" y="18" width="3" height="3"/>
        <rect x="18" y="18" width="3" height="3"/>
      </svg>
      Genera QR Code
    </button>

  </div>

  <!-- ════ MODALE QR (bottom sheet) ════ -->
  <div id="qr-modal" onclick="closeQROnBackdrop(event)">
    <div id="qr-card">
      <div class="qr-handle"></div>
      <h3>Scansiona per aprire in AR</h3>
      <p class="qr-hint">Inquadra con fotocamera o app QR scanner</p>
      <div id="qr-code-container"></div>
      <p id="qr-url"></p>
      <div class="qr-actions">
        <button id="btn-download" onclick="downloadQR()">⬇ Scarica PNG</button>
        <button id="btn-close"    onclick="closeQR()">Chiudi</button>
      </div>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════
    //  CONFIGURAZIONE — modifica questi valori
    // ════════════════════════════════════════
    const CONFIG = {
      githubUser:   'daniloevil',
      githubRepo:   'ar-qr-app',
      githubBranch: 'main',
      modelsFolder: 'models',
    };

    function cdnUrl(file) {
      const f = CONFIG.modelsFolder ? CONFIG.modelsFolder + '/' : '';
      return `https://cdn.jsdelivr.net/gh/${CONFIG.githubUser}/${CONFIG.githubRepo}@${CONFIG.githubBranch}/${f}${file}`;
    }
    function pageUrl(file) {
      return `${location.origin}${location.pathname}?model=${encodeURIComponent(file)}`;
    }

    // ════════════════════════════════════════
    //  CARICAMENTO DA INPUT
    // ════════════════════════════════════════
    const searchInput = document.getElementById('search-input');

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadFromInput();
    });

    function loadFromInput() {
      const val = searchInput.value.trim();
      if (!val) {
        searchInput.focus();
        searchInput.style.color = '#e55';
        setTimeout(() => searchInput.style.color = '', 500);
        return;
      }
      const file = /\.(glb|usdz)$/i.test(val) ? val : val + '.glb';
      loadModel(file);
    }

    // ════════════════════════════════════════
    //  VIEWER
    // ════════════════════════════════════════
    const viewer      = document.getElementById('viewer');
    const arBtn       = document.getElementById('ar-btn');
    const modelNameEl = document.getElementById('model-name');
    const searchScr   = document.getElementById('search-screen');
    const viewerScr   = document.getElementById('viewer-screen');

    let currentFile = null;
    let qrInstance  = null;

    function loadModel(file) {
      currentFile = file;
      const base = file.replace(/\.(glb|usdz)$/i, '');

      history.pushState({}, '', pageUrl(file));
      viewer.setAttribute('src',     cdnUrl(base + '.glb'));
      viewer.setAttribute('ios-src', cdnUrl(base + '.usdz'));
      modelNameEl.textContent = base.replace(/[-_]/g, ' ');

      arBtn.style.display = 'none';
      qrInstance = null;
      document.getElementById('qr-code-container').innerHTML = '';

      searchScr.classList.add('hidden');
      viewerScr.classList.add('visible');
    }

    viewer.addEventListener('ar-status', (e) => {
      if (e.detail.status !== 'failed') arBtn.style.display = 'flex';
    });

    function goBack() {
      history.pushState({}, '', location.pathname);
      viewerScr.classList.remove('visible');
      searchScr.classList.remove('hidden');
      viewer.removeAttribute('src');
      viewer.removeAttribute('ios-src');
      arBtn.style.display = 'none';
      searchInput.value = '';
    }

    // Carica subito se arriva da QR (?model=)
    const p = new URLSearchParams(location.search);
    if (p.get('model')) loadModel(p.get('model'));

    // ════════════════════════════════════════
    //  QR CODE
    // ════════════════════════════════════════
    function openQR() {
      if (!currentFile) return;
      const url = pageUrl(currentFile);
      document.getElementById('qr-url').textContent = url;
      document.getElementById('qr-modal').classList.add('visible');

      if (!qrInstance) {
        const c = document.getElementById('qr-code-container');
        c.innerHTML = '';
        qrInstance = new QRCode(c, {
          text: url, width: 240, height: 240,
          colorDark: '#000', colorLight: '#fff',
          correctLevel: QRCode.CorrectLevel.H,
        });
      }
    }

    function closeQR() {
      document.getElementById('qr-modal').classList.remove('visible');
    }
    function closeQROnBackdrop(e) {
      if (e.target === document.getElementById('qr-modal')) closeQR();
    }

    function downloadQR() {
      const canvas = document.querySelector('#qr-code-container canvas');
      if (!canvas) return;
      const pad = 24, tmp = document.createElement('canvas');
      tmp.width = canvas.width + pad*2;
      tmp.height = canvas.height + pad*2;
      const ctx = tmp.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, tmp.width, tmp.height);
      ctx.drawImage(canvas, pad, pad);
      const url = pageUrl(currentFile);
      ctx.fillStyle = '#444';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(url.slice(0,64)+(url.length>64?'…':''), tmp.width/2, tmp.height - 7);
      const a = document.createElement('a');
      a.download = `qr-${currentFile.replace(/\.(glb|usdz)$/i,'')}.png`;
      a.href = tmp.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
