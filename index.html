<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizzatore CAD AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f4f4f4; }
        model-viewer { width: 100vw; height: 100vh; background-color: #eee; }
        .error-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: none; }
    </style>
</head>
<body>

    <div id="error" class="error-msg">
        <p>⚠️ Modello non specificato o non trovato.</p>
    </div>

    <model-viewer id="viewer" 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    touch-action="none" 
    
    /* CENTRAGGIO TOTALE */
    bounds="tight" 
    min-camera-orbit="auto auto auto"
    max-camera-orbit="auto auto auto"
    
    /* ILLUMINAZIONE TECNICA */
    shadow-intensity="0" 
    environment-image="neutral" 
    exposure="1"
    
    /* COMPORTAMENTO */
    interaction-prompt="none" 
    
    alt="Modello CAD Meccanico">
    
    <button slot="ar-button" style="background: white; border: 1px solid #ccc; padding: 10px; position: absolute; bottom: 20px; right: 20px;">
        Visualizza in AR
    </button>
</model-viewer>

    <script>
        // CONFIGURAZIONE: Inserisci qui il percorso della tua cartella GitHub
        const GITHUB_BASE_URL = "https://raw.githubusercontent.com/daniloevil/ar-qr-app/main/models/";

        // 1. Legge il parametro 'model' dall'URL (es: ?model=bullone)
        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('model');
        const viewer = document.getElementById('viewer');
        const errorDiv = document.getElementById('error');

        if (modelName) {
            // 2. Costruisce l'URL completo al file .glb
            const modelPath = `${GITHUB_BASE_URL}${modelName}.glb`;
            viewer.src = modelPath;
            
            // Per compatibilità iOS (Quick Look) serve anche un file .usdz se lo hai, 
            // altrimenti model-viewer proverà a generarlo al volo o userà il glb.
            viewer.iosSrc = modelPath; 
        } else {
            viewer.style.display = 'none';
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
