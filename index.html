<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizzatore CAD - Danilo (Black Edition)</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* SFONDO NERO TOTALE */
        body { margin: 0; font-family: sans-serif; background: #000000; overflow: hidden; }
        
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #000000; 
        }

        .controls {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 100;
        }

        /* TASTI BIANCHI PER CONTRASTO */
        .view-btn {
            background: rgba(255, 255, 255, 0.9); 
            border: 1px solid #ffffff; 
            border-radius: 4px;
            padding: 10px 15px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 11px;
            color: #000;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        #status-log {
            position: absolute; bottom: 10px; left: 10px;
            font-size: 10px; color: #555; font-family: monospace;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="view-btn" onclick="setView('top')">Vista Alto (Top)</button>
        <button class="view-btn" onclick="setView('front')">Vista Fronte (Front)</button>
        <button class="view-btn" onclick="setView('side')">Vista Lato (Side)</button>
    </div>

    <div id="status-log">Caricamento...</div>

    <model-viewer id="viewer" 
        camera-controls 
        touch-action="pan-y" 
        bounds="tight" 
        min-camera-orbit="auto 0deg auto"
        interaction-prompt="none"
        shadow-intensity="0" 
        exposure="1.2" 
        environment-image="neutral"
        alt="Modello CAD">
    </model-viewer>

    <script>
        const GITHUB_BASE_URL = "https://raw.githubusercontent.com/daniloevil/ar-qr-app/main/models/";
        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('model');
        const viewer = document.getElementById('viewer');
        const log = document.getElementById('status-log');

        if (modelName) {
            const fileUrl = GITHUB_BASE_URL + modelName + ".glb";
            viewer.src = fileUrl;
            log.innerText = "Modello: " + modelName;
        }

        function setView(view) {
            switch(view) {
                case 'top': viewer.cameraOrbit = "0deg 0deg 100%"; break;
                case 'front': viewer.cameraOrbit = "0deg 90deg 100%"; break;
                case 'side': viewer.cameraOrbit = "90deg 90deg 100%"; break;
            }
            viewer.jumpCameraToGoal();
        }

        viewer.addEventListener('load', () => {
            log.innerText = "Pronto.";
        });
    </script>
</body>
</html>
