<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizzatore CAD AR - Danilo</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background: #ffffff; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; background-color: #ffffff; }

        .controls {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 100;
        }

        .view-btn {
            background: white; border: 2px solid #333; border-radius: 4px;
            padding: 10px 15px; cursor: pointer; font-weight: bold; font-size: 11px;
        }

        /* Pulsante AR più visibile per lo smartphone */
        #ar-button {
            background-color: #007bff;
            color: white;
            border-radius: 8px;
            border: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 25px;
            font-weight: bold;
            font-size: 16px;
            display: block; /* Assicura che sia visibile */
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="view-btn" onclick="setView('top')">Vista Alto (Top)</button>
        <button class="view-btn" onclick="setView('front')">Vista Fronte (Front)</button>
        <button class="view-btn" onclick="setView('side')">Vista Lato (Side)</button>
    </div>

    <model-viewer id="viewer" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="none" 
        bounds="tight" 
        interaction-prompt="none"
        shadow-intensity="0" 
        exposure="1"
        environment-image="neutral"
        
        /* FIX VISTA ALTO: permette alla camera di arrivare a 0 gradi */
        min-camera-orbit="auto 0deg auto"
        
        alt="Modello CAD">
        
        <button slot="ar-button" id="ar-button">
            🚀 VEDI NEL TUO AMBIENTE
        </button>
    </model-viewer>

    <script>
        const GITHUB_BASE_URL = "https://raw.githubusercontent.com/daniloevil/ar-qr-app/main/models/";
        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('model');
        const viewer = document.getElementById('viewer');

        if (modelName) {
            const fileUrl = GITHUB_BASE_URL + modelName + ".glb";
            viewer.src = fileUrl;
            // Per iPhone, model-viewer proverà a generare un file USDZ temporaneo dal GLB
            viewer.iosSrc = fileUrl; 
        }

        function setView(view) {
            switch(view) {
                case 'top': 
                    // 0deg 0deg porta la camera esattamente sopra
                    viewer.cameraOrbit = "0deg 0deg 100%"; 
                    break;
                case 'front': 
                    viewer.cameraOrbit = "0deg 90deg 100%"; 
                    break;
                case 'side': 
                    viewer.cameraOrbit = "90deg 90deg 100%"; 
                    break;
            }
            viewer.jumpCameraToGoal();
        }
    </script>
</body>
</html>
