<!DOCTYPE html>
<html lang="it">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        .controls {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .view-btn {
            background: white; border: 2px solid #333; padding: 10px;
            cursor: pointer; font-weight: bold; font-size: 11px;
        }
        /* Messaggio diagnostico a schermo */
        #debug-console {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.8); color: #00ff00;
            padding: 10px; font-family: monospace; font-size: 12px;
            z-index: 2000; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="debug-console">Inizializzazione sistema...</div>

    <div class="controls">
        <button class="view-btn" onclick="rotateModel('top')">VISTA ALTO</button>
        <button class="view-btn" onclick="rotateModel('front')">VISTA FRONTE</button>
        <button class="view-btn" onclick="rotateModel('side')">VISTA LATO</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="modelAsset" src=""></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="targetContainer" mindar-image-target="targetIndex: 0">
            <a-gltf-model id="cadModel" 
                rotation="0 0 0" 
                position="0 0.4 0" 
                scale="0.2 0.2 0.2">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const consoleLog = document.getElementById('debug-console');
        const GITHUB_BASE_URL = "https://raw.githubusercontent.com/daniloevil/ar-qr-app/main/models/";
        
        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('model');

        // Check 1: Modello
        if (modelName) {
            const fullUrl = GITHUB_BASE_URL + modelName + ".glb";
            document.querySelector('#cadModel').setAttribute('gltf-model', fullUrl);
            consoleLog.innerText += "\n> Caricamento modello: " + modelName;
        } else {
            consoleLog.innerText += "\n> ERRORE: Manca ?model= nell'URL";
        }

        // Check 2: Eventi Target
        const target = document.querySelector('#targetContainer');
        
        target.addEventListener("targetFound", () => {
            consoleLog.style.color = "#00ff00";
            consoleLog.innerText = "TARGET TROVATO - Modello visualizzato";
        });

        target.addEventListener("targetLost", () => {
            consoleLog.innerText = "Inquadra il logo per vedere il pezzo...";
        });

        // Gestione errori di caricamento MindAR
        window.addEventListener("mindar-image-ready", () => {
            consoleLog.innerText += "\n> MindAR pronto. Inquadra il marker.";
        });

        window.addEventListener("mindar-image-error", (e) => {
            consoleLog.style.color = "red";
            consoleLog.innerText += "\n> ERRORE MINDAR: File .mind non trovato o corrotto.";
        });

        function rotateModel(view) {
            const m = document.querySelector('#cadModel');
            if(view === 'top') m.setAttribute('rotation', '90 0 0');
            if(view === 'front') m.setAttribute('rotation', '0 0 0');
            if(view === 'side') m.setAttribute('rotation', '0 90 0');
        }
    </script>
</body>
</html>
