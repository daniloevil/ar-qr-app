<!DOCTYPE html>
<html lang="it">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        .controls {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .view-btn {
            background: white; border: 2px solid #333; border-radius: 4px;
            padding: 10px 15px; cursor: pointer; font-weight: bold; font-size: 11px;
        }
        /* Messaggio di stato */
        #status-log {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 5px; font-size: 10px; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="status-log">Inizializzazione...</div>

    <div class="controls">
        <button class="view-btn" onclick="rotateModel('top')">Vista Alto</button>
        <button class="view-btn" onclick="rotateModel('front')">Vista Fronte</button>
        <button class="view-btn" onclick="rotateModel('side')">Vista Lato</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; uiScanning: #scanning-overlay; filterMinCF:0.0001; filterBeta:0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-gltf-model id="model-entity" 
                rotation="0 0 0" 
                position="0 0.4 0" 
                scale="0.3 0.3 0.3">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const log = document.getElementById('status-log');
        const GITHUB_BASE_URL = "https://raw.githubusercontent.com/daniloevil/ar-qr-app/main/models/";
        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('model');
        const modelEntity = document.querySelector('#model-entity');

        // 1. Caricamento Modello
        if (modelName) {
            const fileUrl = GITHUB_BASE_URL + modelName + ".glb";
            modelEntity.setAttribute('gltf-model', fileUrl);
            log.innerText = "Modello caricato: " + modelName;
        } else {
            log.innerText = "Errore: Nessun modello nell'URL";
        }

        // 2. Controllo Eventi AR
        const targetEntity = document.querySelector('#target');
        
        targetEntity.addEventListener("targetFound", () => {
            log.innerText = "Target TROVATO! 🎯";
            log.style.background = "green";
        });

        targetEntity.addEventListener("targetLost", () => {
            log.innerText = "Target Perso. Inquadra il logo.";
            log.style.background = "orange";
        });

        // 3. Rotazione
        function rotateModel(view) {
            switch(view) {
                case 'top': modelEntity.setAttribute('rotation', '90 0 0'); break;
                case 'front': modelEntity.setAttribute('rotation', '0 0 0'); break;
                case 'side': modelEntity.setAttribute('rotation', '0 90 0'); break;
            }
        }
    </script>
</body>
</html>
