<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>WebAR Viewer</title>

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js">
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surface: #1c1c1c;
      --border:  rgba(255,255,255,0.09);
      --accent:  #3ecfcf;
      --text:    #f0f0f0;
      --muted:   #777;
      --radius:  14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ══ SCHERMATA RICERCA ══ */
    #search-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(52px, env(safe-area-inset-top)) 20px 32px;
      overflow-y: auto;
      background: var(--bg);
    }
    #search-screen.hidden { display: none; }

    .logo {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 36px;
    }
    .search-title {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      line-height: 1.25;
      margin-bottom: 8px;
    }
    .search-sub {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Campo di testo + pulsante */
    .search-row {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 4px 4px 4px 20px;
      margin-bottom: 28px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-row:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(62,207,207,0.13);
    }

    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      padding: 10px 0;
      caret-color: var(--accent);
      min-width: 0;
    }
    #search-input::placeholder { color: var(--muted); }

    #search-go {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 40px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    #search-go:active { opacity: 0.72; }

    /* Lista modelli */
    .list-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.09em;
      color: var(--muted);
      text-transform: uppercase;
      width: 100%;
      max-width: 480px;
      margin-bottom: 10px;
    }
    #model-list {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .model-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .model-card:hover, .model-card:focus {
      border-color: rgba(62,207,207,0.4);
      background: rgba(62,207,207,0.06);
      outline: none;
    }
    .card-info { display: flex; flex-direction: column; gap: 3px; }
    .card-name { font-size: 15px; font-weight: 600; }
    .card-file { font-size: 12px; color: var(--muted); }
    .card-arrow { font-size: 20px; color: var(--accent); }

    #list-empty {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      padding: 20px;
      display: none;
      line-height: 1.6;
    }

    /* ══ VIEWER SCREEN ══ */
    #viewer-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
    }
    #viewer-screen.visible { display: block; }

    model-viewer {
      width: 100%;
      height: 100dvh;
      background: transparent;
      --progress-bar-color: var(--accent);
      --progress-bar-height: 3px;
    }

    #top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: max(14px, env(safe-area-inset-top)) 14px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.65), transparent);
      z-index: 20;
    }
    #back-btn {
      background: rgba(255,255,255,0.13);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      width: 38px; height: 38px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #model-name {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #qr-btn {
      background: rgba(255,255,255,0.13);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    #ar-btn {
      position: fixed;
      bottom: calc(32px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: none;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ══ MODALE QR ══ */
    #qr-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 60;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    #qr-modal.visible { display: flex; }
    #qr-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 28px 24px 20px;
      width: min(340px, calc(100vw - 40px));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    #qr-card h3 { font-size: 15px; color: #111; font-weight: 700; }
    #qr-url { font-size: 11px; color: #555; word-break: break-all; text-align: center; max-width: 280px; }
    .qr-actions { display: flex; gap: 10px; width: 100%; }
    .qr-actions button {
      flex: 1; padding: 11px; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer; border: none;
    }
    #btn-download { background: #111; color: #fff; }
    #btn-close    { background: #eee; color: #111; }
  </style>
</head>
<body>

  <!-- ════ SCHERMATA 1: RICERCA ════ -->
  <div id="search-screen">
    <p class="logo">WebAR Viewer</p>

    <h1 class="search-title">Scegli un modello<br>da visualizzare</h1>
    <p class="search-sub">Digita il nome del file .glb oppure<br>seleziona dalla lista qui sotto</p>

    <div class="search-row">
      <input
        type="text"
        id="search-input"
        placeholder="es: sedia.glb"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
      />
      <button id="search-go" onclick="loadFromInput()">Carica →</button>
    </div>

    <p class="list-label">Modelli disponibili</p>
    <div id="model-list"></div>
    <p id="list-empty">
      Aggiungi i tuoi modelli in CONFIG.models<br>per vederli elencati qui.
    </p>
  </div>

  <!-- ════ SCHERMATA 2: VIEWER ════ -->
  <div id="viewer-screen">
    <div id="top-bar">
      <button id="back-btn" onclick="goBack()" title="Torna alla ricerca">←</button>
      <span id="model-name">—</span>
      <button id="qr-btn" onclick="openQR()">📲 QR</button>
    </div>

    <model-viewer
      id="viewer"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      auto-rotate-delay="600"
      shadow-intensity="1"
      shadow-softness="0.8"
      reveal="auto"
      loading="eager"
      environment-image="neutral"
      exposure="1"
      tone-mapping="commerce"
      ar-button-style="none"
    >
      <button id="ar-btn" slot="ar-button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
          <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
          <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
          <path d="M12 8l4 2v4l-4 2-4-2v-4l4-2z"/>
        </svg>
        Visualizza in AR
      </button>
    </model-viewer>
  </div>

  <!-- ════ MODALE QR ════ -->
  <div id="qr-modal" onclick="closeQROnBackdrop(event)">
    <div id="qr-card">
      <h3>Scansiona per aprire in AR</h3>
      <div id="qr-code-container"></div>
      <p id="qr-url"></p>
      <div class="qr-actions">
        <button id="btn-download" onclick="downloadQR()">⬇ Scarica PNG</button>
        <button id="btn-close"    onclick="closeQR()">Chiudi</button>
      </div>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════
    //  CONFIGURAZIONE
    // ════════════════════════════════════════
    const CONFIG = {
      githubUser:   'TUO-USERNAME',
      githubRepo:   'TUO-REPO',
      githubBranch: 'main',
      modelsFolder: 'models',

      // Modelli mostrati nella lista cliccabile.
      // Formato: { label: 'Nome leggibile', file: 'nomefile.glb' }
      // Array vuoto [] = usa solo il campo di testo.
      models: [
        { label: 'Sedia',   file: 'sedia.glb'   },
        { label: 'Tavolo',  file: 'tavolo.glb'  },
        { label: 'Lampada', file: 'lampada.glb' },
      ],
    };

    // ════════════════════════════════════════
    //  UTILITÀ URL
    // ════════════════════════════════════════
    function cdnUrl(file) {
      const f = CONFIG.modelsFolder ? CONFIG.modelsFolder + '/' : '';
      return `https://cdn.jsdelivr.net/gh/${CONFIG.githubUser}/${CONFIG.githubRepo}@${CONFIG.githubBranch}/${f}${file}`;
    }
    function pageUrl(file) {
      return `${location.origin}${location.pathname}?model=${encodeURIComponent(file)}`;
    }

    // ════════════════════════════════════════
    //  POPOLA LA LISTA MODELLI
    // ════════════════════════════════════════
    const listEl  = document.getElementById('model-list');
    const emptyEl = document.getElementById('list-empty');

    if (CONFIG.models.length === 0) {
      emptyEl.style.display = 'block';
    } else {
      CONFIG.models.forEach(({ label, file }) => {
        const card = document.createElement('div');
        card.className = 'model-card';
        card.tabIndex  = 0;
        card.innerHTML = `
          <div class="card-info">
            <span class="card-name">${label}</span>
            <span class="card-file">${file}</span>
          </div>
          <span class="card-arrow">›</span>
        `;
        card.addEventListener('click',   () => loadModel(file));
        card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') loadModel(file); });
        listEl.appendChild(card);
      });
    }

    // ════════════════════════════════════════
    //  INPUT DA CAMPO DI TESTO
    // ════════════════════════════════════════
    const searchInput = document.getElementById('search-input');

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadFromInput();
    });

    function loadFromInput() {
      const val = searchInput.value.trim();
      if (!val) {
        searchInput.focus();
        searchInput.style.color = '#e55';
        setTimeout(() => searchInput.style.color = '', 500);
        return;
      }
      const file = /\.(glb|usdz)$/i.test(val) ? val : val + '.glb';
      loadModel(file);
    }

    // ════════════════════════════════════════
    //  CARICA MODELLO NEL VIEWER
    // ════════════════════════════════════════
    const viewer      = document.getElementById('viewer');
    const arBtn       = document.getElementById('ar-btn');
    const modelNameEl = document.getElementById('model-name');
    const searchScr   = document.getElementById('search-screen');
    const viewerScr   = document.getElementById('viewer-screen');

    let currentFile = null;
    let qrInstance  = null;

    function loadModel(file) {
      currentFile = file;
      const base = file.replace(/\.(glb|usdz)$/i, '');

      history.pushState({}, '', pageUrl(file));
      viewer.setAttribute('src',     cdnUrl(base + '.glb'));
      viewer.setAttribute('ios-src', cdnUrl(base + '.usdz'));
      modelNameEl.textContent = base.replace(/[-_]/g, ' ');

      arBtn.style.display = 'none';
      qrInstance = null;
      document.getElementById('qr-code-container').innerHTML = '';

      searchScr.classList.add('hidden');
      viewerScr.classList.add('visible');
    }

    viewer.addEventListener('ar-status', (e) => {
      if (e.detail.status !== 'failed') arBtn.style.display = 'flex';
    });

    function goBack() {
      history.pushState({}, '', location.pathname);
      viewerScr.classList.remove('visible');
      searchScr.classList.remove('hidden');
      viewer.removeAttribute('src');
      viewer.removeAttribute('ios-src');
      arBtn.style.display = 'none';
      searchInput.value = '';
    }

    // Carica subito se arriva da QR (?model=)
    const p = new URLSearchParams(location.search);
    if (p.get('model')) loadModel(p.get('model'));

    // ════════════════════════════════════════
    //  QR CODE
    // ════════════════════════════════════════
    function openQR() {
      if (!currentFile) return;
      const url = pageUrl(currentFile);
      document.getElementById('qr-url').textContent = url;
      document.getElementById('qr-modal').classList.add('visible');
      if (!qrInstance) {
        const c = document.getElementById('qr-code-container');
        c.innerHTML = '';
        qrInstance = new QRCode(c, {
          text: url, width: 220, height: 220,
          colorDark: '#000', colorLight: '#fff',
          correctLevel: QRCode.CorrectLevel.H,
        });
      }
    }
    function closeQR() { document.getElementById('qr-modal').classList.remove('visible'); }
    function closeQROnBackdrop(e) { if (e.target === document.getElementById('qr-modal')) closeQR(); }

    function downloadQR() {
      const canvas = document.querySelector('#qr-code-container canvas');
      if (!canvas) return;
      const pad = 20, tmp = document.createElement('canvas');
      tmp.width = canvas.width + pad*2; tmp.height = canvas.height + pad*2;
      const ctx = tmp.getContext('2d');
      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,tmp.width,tmp.height);
      ctx.drawImage(canvas, pad, pad);
      const url = pageUrl(currentFile);
      ctx.fillStyle = '#333'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(url.slice(0,60)+(url.length>60?'…':''), tmp.width/2, tmp.height-6);
      const a = document.createElement('a');
      a.download = `qr-${currentFile.replace(/\.(glb|usdz)$/i,'')}.png`;
      a.href = tmp.toDataURL('image/png'); a.click();
    }
  </script>
</body>
</html>
